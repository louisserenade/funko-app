<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funko Marsupilami Manage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-dk:#3C3489;--purple-lt:#EEEDFE;
  --bg:#f8f8f7;--surface:#fff;--border:#e5e5e3;--border2:#d0d0cc;
  --text:#1a1a18;--muted:#6b6b67;--faint:#9b9b97;
  --green-bg:#EAF3DE;--green-tx:#27500A;
  --red-bg:#FCEBEB;--red-tx:#791F1F;
  --blue-bg:#E6F1FB;--blue-tx:#0C447C;
  --amber-bg:#FAEEDA;--amber-tx:#633806;
  --teal-bg:#E1F5EE;--teal-tx:#04342C;
  --gray-bg:#F1EFE8;--gray-tx:#444441;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh}

/* SETUP SCREEN */
#setupScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;width:min(440px,100%)}
.setup-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
.setup-card h1 span{color:var(--purple)}
.setup-card p{color:var(--muted);font-size:13px;margin-bottom:1.5rem;line-height:1.6}
.setup-field{margin-bottom:12px}
.setup-field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px}
.setup-field input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px;outline:none;transition:border-color .15s}
.setup-field input:focus{border-color:var(--purple)}
.btn-setup{width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
.btn-setup:hover{background:var(--purple-dk)}
.setup-err{color:#A32D2D;font-size:12px;margin-top:8px;display:none}

/* MAIN APP */
#mainApp{display:none;padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.logo span{color:var(--purple)}
.top-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rate-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--muted)}
.rate-box input{width:76px;font-size:12px;border:none;background:transparent;color:var(--text);font-weight:600;text-align:right;outline:none}
.btn{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dk);border-color:var(--purple-dk)}
.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.stat-val{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.green{color:var(--green-tx)}.red{color:var(--red-tx)}.purple{color:var(--purple)}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:6px 9px;border:1px solid var(--border2);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
.toolbar input{flex:1;min-width:130px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--purple)}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px}
th{background:var(--bg);font-weight:500;font-size:11px;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
td.r{text-align:right;font-variant-numeric:tabular-nums}
td.profit{color:var(--green-tx);font-weight:600;text-align:right}
td.loss{color:var(--red-tx);font-weight:600;text-align:right}
td.muted{color:var(--muted);text-align:right}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.s-Done{background:var(--green-bg);color:var(--green-tx)}
.s-Sent-to-VN{background:var(--blue-bg);color:var(--blue-tx)}
.s-Delivered-in-US{background:#C0DD97;color:#173404}
.s-Purchased{background:var(--purple-lt);color:var(--purple-dk)}
.s-Sent-to-Customer{background:var(--teal-bg);color:var(--teal-tx)}
.s-Stored{background:var(--gray-bg);color:var(--gray-tx)}
.s-Pre-Ordered{background:var(--amber-bg);color:var(--amber-tx)}
.s-In-Transit{background:#B5D4F4;color:#042C53}
.s-Return{background:var(--red-bg);color:var(--red-tx)}
.s-Cancelled{background:#F7C1C1;color:#501313}
.s-Refunded{background:#FAECE7;color:#712B13}
.s-Deposited{background:#FAC775;color:#412402}
.s-In-Stock{background:#9FE1CB;color:#04342C}
.s-def{background:var(--gray-bg);color:var(--muted)}
.act-btns{display:flex;gap:3px;justify-content:center}
.icon-btn{background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;color:var(--muted);font-size:11px}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.icon-btn.del:hover{color:var(--red-tx)}
.empty{text-align:center;padding:3rem;color:var(--muted)}
.loading{text-align:center;padding:3rem;color:var(--muted)}

/* COL WIDTHS */
.c-stt{width:44px;text-align:center;color:var(--muted)}.c-product{width:175px}.c-sm{width:90px}.c-xs{width:72px}.c-status{width:128px}.c-note{width:140px}.c-act{width:66px;text-align:center}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:500;overflow-y:auto;padding:32px 12px}
.overlay.open{display:block}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:min(580px,100%);margin:0 auto 32px;border:1px solid var(--border2)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;font-weight:500;color:var(--muted)}
.f input,.f select,.f textarea{padding:7px 9px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--purple)}
.f input[readonly]{background:var(--bg);color:var(--muted);cursor:default}
.f textarea{resize:vertical;min-height:52px;font-family:inherit}
.f .hint{font-size:11px;color:var(--muted);margin-top:2px}
.full{grid-column:1/-1}
.sec{grid-column:1/-1;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding-top:6px}
.divhr{grid-column:1/-1;border:none;border-top:1px solid var(--border);margin:2px 0}
.mfooter{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem}
.profit-prev{font-size:13px;font-weight:600}
.profit-prev.pos{color:var(--green-tx)}.profit-prev.neg{color:var(--red-tx)}.profit-prev.z{color:var(--muted)}
.mfooter-r{display:flex;gap:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.fgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <div class="setup-card">
    <h1>Funko<span>Vault</span></h1>
    <p>Nhập URL và password Apps Script để kết nối Google Sheet của bạn.</p>
    <div class="setup-field">
      <label>Apps Script URL</label>
      <input type="url" id="cfgUrl" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div class="setup-field">
      <label>Password</label>
      <input type="password" id="cfgPwd" placeholder="Password bạn đã đặt trong Code.gs">
    </div>
    <button class="btn-setup" onclick="saveConfig()">Kết nối & Vào app</button>
    <div class="setup-err" id="setupErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="topbar">
    <div class="logo">Funko<span>Vault</span></div>
    <div class="top-right">
      <div class="rate-box">
        <span>Tỷ giá:</span>
        <input type="number" id="usdRate" value="25500" onchange="render()">
        <span>₫/$</span>
      </div>
      <button class="btn" onclick="loadData()">↻ Refresh</button>
      <button class="btn" onclick="exportCSV()">Xuất CSV</button>
      <button class="btn" onclick="clearConfig()">Đổi tài khoản</button>
      <button class="btn btn-primary" onclick="openModal()">+ Thêm mới</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Tìm tên, khách, cửa hàng..." oninput="render()">
    <select id="fStatus" onchange="render()">
      <option value="">Tất cả tình trạng</option>
      <option>Done</option><option>Sent to VN</option><option>Delivered in US</option>
      <option>Purchased</option><option>Sent to Customer</option><option>Stored</option>
      <option>Pre-Ordered</option><option>In-Transit</option><option>Return</option>
      <option>Cancelled</option><option>Refunded</option><option>Deposited</option><option>In Stock</option>
    </select>
    <select id="fShop" onchange="render()">
      <option value="">Tất cả cửa hàng</option>
      <option>Amazon</option><option>Ebay</option><option>Facebook</option>
      <option>Hot Topic</option><option>BoxLunch</option><option>Target</option>
      <option>Funko-Shop</option><option>GameStop</option><option>Mercari</option>
      <option>Walmart</option><option>Small Stores</option><option>Other Stores</option>
    </select>
    <select id="sortBy" onchange="render()">
      <option value="date">Mới nhất</option>
      <option value="name">Tên A–Z</option>
      <option value="profit_desc">Lời nhiều nhất</option>
      <option value="price_desc">Giá bán cao nhất</option>
    </select>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th class="c-stt">#</th>
        <th class="c-product">Product</th>
        <th class="c-sm">Vốn USD</th>
        <th class="c-sm">Vốn (₫)</th>
        <th class="c-xs">V.Chuyển</th>
        <th class="c-xs">Phụ phí</th>
        <th class="c-sm">Cọc qua</th>
        <th class="c-xs">Cọc</th>
        <th class="c-sm">Giá bán</th>
        <th class="c-xs">Còn lại</th>
        <th class="c-xs">Lời</th>
        <th class="c-status">Tình trạng</th>
        <th class="c-sm">Cửa hàng</th>
        <th class="c-sm">Khách</th>
        <th class="c-note">Note</th>
        <th class="c-act"></th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="16" class="loading">Đang tải...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Thêm Funko Pop mới</h2>
    <input type="hidden" id="eId">
    <div class="fgrid">
      <div class="sec">Thông tin sản phẩm</div>
      <div class="f full">
        <label>Product *</label>
        <input type="text" id="fProduct" placeholder="Tên sản phẩm / số hiệu">
      </div>
      <div class="f">
        <label>Cửa hàng</label>
        <select id="fShopIn">
          <option value="">— Chọn cửa hàng —</option>
          <option>Amazon</option><option>Ebay</option><option>Facebook</option>
          <option>Hot Topic</option><option>BoxLunch</option><option>Target</option>
          <option>Funko-Shop</option><option>GameStop</option><option>Mercari</option>
          <option>Walmart</option><option>Small Stores</option><option>Other Stores</option>
        </select>
      </div>
      <div class="f">
        <label>Khách</label>
        <input type="text" id="fCustomer" placeholder="Tên khách hàng">
      </div>
      <div class="f full">
        <label>Tình trạng</label>
        <select id="fStatusIn">
          <option>Pre-Ordered</option><option>Purchased</option><option>Deposited</option>
          <option>In Stock</option><option>Stored</option><option>Sent to VN</option>
          <option>In-Transit</option><option>Delivered in US</option>
          <option>Sent to Customer</option><option>Done</option>
          <option>Return</option><option>Refunded</option><option>Cancelled</option>
        </select>
      </div>
      <hr class="divhr">
      <div class="sec">Chi phí</div>
      <div class="f">
        <label>Vốn USD ($)</label>
        <input type="number" id="fVonUSD" placeholder="0.00" step="0.01" oninput="syncVon()">
      </div>
      <div class="f">
        <label>Vốn (₫) — tự tính</label>
        <input type="number" id="fVon" readonly>
        <span class="hint" id="vonHint"></span>
      </div>
      <div class="f">
        <label>Vận chuyển (₫)</label>
        <input type="number" id="fShip" placeholder="0" oninput="syncProfit()">
      </div>
      <div class="f">
        <label>Phụ phí (₫)</label>
        <input type="number" id="fExtra" placeholder="0" oninput="syncProfit()">
      </div>
      <hr class="divhr">
      <div class="sec">Thanh toán</div>
      <div class="f">
        <label>Cọc qua</label>
        <input type="text" id="fDepositVia" placeholder="Momo, Chuyển khoản...">
      </div>
      <div class="f">
        <label>Cọc (₫)</label>
        <input type="number" id="fDeposit" placeholder="0" oninput="syncProfit()">
      </div>
      <div class="f">
        <label>Giá bán (₫)</label>
        <input type="number" id="fSell" placeholder="0" oninput="syncProfit()">
      </div>
      <div class="f">
        <label>Còn lại (₫) — tự tính</label>
        <input type="number" id="fRemain" readonly>
      </div>
      <hr class="divhr">
      <div class="f full">
        <label>Note</label>
        <textarea id="fNote" placeholder="Ghi chú thêm..."></textarea>
      </div>
    </div>
    <div class="mfooter">
      <div class="profit-prev z" id="profitPrev">Lời: —</div>
      <div class="mfooter-r">
        <button class="btn" onclick="closeModal()">Hủy</button>
        <button class="btn btn-primary" id="saveBtn" onclick="save()">Lưu</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHOPS=['Amazon','Ebay','Facebook','Hot Topic','BoxLunch','Target','Funko-Shop','GameStop','Mercari','Walmart','Small Stores','Other Stores'];
const STATUSES=['Pre-Ordered','Purchased','Deposited','In Stock','Stored','Sent to VN','In-Transit','Delivered in US','Sent to Customer','Done','Return','Refunded','Cancelled'];

let CFG={url:'',pwd:''};
let items=[];

// ---- CONFIG ----
function loadConfig(){
  const u=localStorage.getItem('fv_url')||'';
  const p=localStorage.getItem('fv_pwd')||'';
  if(u&&p){CFG={url:u,pwd:p};showApp();}
}
function saveConfig(){
  const u=document.getElementById('cfgUrl').value.trim();
  const p=document.getElementById('cfgPwd').value.trim();
  if(!u||!p){showErr('Vui lòng nhập đủ URL và password');return;}
  CFG={url:u,pwd:p};
  localStorage.setItem('fv_url',u);
  localStorage.setItem('fv_pwd',p);
  showApp();
}
function clearConfig(){
  if(!confirm('Đổi tài khoản? Sẽ cần nhập lại URL và password.'))return;
  localStorage.removeItem('fv_url');localStorage.removeItem('fv_pwd');
  document.getElementById('mainApp').style.display='none';
  document.getElementById('setupScreen').style.display='flex';
}
function showApp(){
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  loadData();
}
function showErr(msg){const e=document.getElementById('setupErr');e.textContent=msg;e.style.display='block';}

// ---- API ----
async function api(body){
  const payload={...body,pwd:CFG.pwd};
  const qs=Object.keys(payload).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(typeof payload[k]==='object'?JSON.stringify(payload[k]):payload[k])).join('&');
  const res=await fetch(CFG.url+'?'+qs);
  return res.json();
}
async function loadData(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="16" class="loading">Đang tải dữ liệu...</td></tr>';
  try{
    const r=await api({action:'getAll'});
    if(!r.ok)throw new Error(r.error);
    items=r.data||[];
    render();
    toast('Đã tải '+items.length+' sản phẩm');
  }catch(e){
    document.getElementById('tbody').innerHTML='<tr><td colspan="16" class="empty">Lỗi: '+e.message+'</td></tr>';
  }
}

// ---- RENDER ----
function rate(){return parseFloat(document.getElementById('usdRate').value)||25500;}
function vnd(n){if(!n||n==0)return'—';return new Intl.NumberFormat('vi-VN').format(Math.round(n))+'₫';}
function usd(n){return n?'$'+parseFloat(n).toFixed(2):'—';}

function calcItem(i){
  const von=parseFloat(i['Vốn'])||0;
  const ship=parseFloat(i['Vận Chuyển'])||0;
  const extra=parseFloat(i['Phụ phí'])||0;
  const sell=parseFloat(i['Giá bán'])||0;
  const deposit=parseFloat(i['Cọc'])||0;
  const remain=Math.max(0,sell-deposit);
  const profit=sell-(von+ship+extra);
  return{remain,profit,sell};
}

function statusClass(s){
  return 's-'+(s||'').replace(/\s+/g,'-')||'s-def';
}

function renderStats(){
  const real=items.filter(i=>!['Cancelled','Refunded'].includes(i['Tình trạng']));
  const done=items.filter(i=>['Done','Sent to Customer'].includes(i['Tình trạng']));
  const totalProfit=done.reduce((s,i)=>s+calcItem(i).profit,0);
  const totalCost=real.reduce((s,i)=>s+(parseFloat(i['Vốn'])||0)+(parseFloat(i['Vận Chuyển'])||0)+(parseFloat(i['Phụ phí'])||0),0);
  const active=items.filter(i=>!['Done','Cancelled','Refunded'].includes(i['Tình trạng'])).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Tổng sản phẩm</div><div class="stat-val purple">${items.length}</div></div>
    <div class="stat"><div class="stat-label">Đang xử lý</div><div class="stat-val">${active}</div></div>
    <div class="stat"><div class="stat-label">Tổng vốn bỏ ra</div><div class="stat-val" style="font-size:13px">${vnd(totalCost)}</div></div>
    <div class="stat"><div class="stat-label">Lời (Done)</div><div class="stat-val ${totalProfit>=0?'green':'red'}" style="font-size:13px">${vnd(totalProfit)}</div></div>
    <div class="stat"><div class="stat-label">Tỷ giá</div><div class="stat-val" style="font-size:13px">1$=${new Intl.NumberFormat('vi-VN').format(rate())}₫</div></div>
  `;
}

function render(){
  renderStats();
  const q=document.getElementById('search').value.toLowerCase();
  const st=document.getElementById('fStatus').value;
  const sh=document.getElementById('fShop').value;
  const so=document.getElementById('sortBy').value;
  let list=items.filter(i=>{
    const fields=[i['Product'],i['Khách'],i['Cửa hàng'],i['Note']];
    if(q&&!fields.some(x=>(x||'').toLowerCase().includes(q)))return false;
    if(st&&i['Tình trạng']!==st)return false;
    if(sh&&i['Cửa hàng']!==sh)return false;
    return true;
  });
  if(so==='name')list.sort((a,b)=>(a['Product']||'').localeCompare(b['Product']));
  else if(so==='profit_desc')list.sort((a,b)=>calcItem(b).profit-calcItem(a).profit);
  else if(so==='price_desc')list.sort((a,b)=>calcItem(b).sell-calcItem(a).sell);

  const tbody=document.getElementById('tbody');
  if(!list.length){tbody.innerHTML='<tr><td colspan="16" class="empty">Không có dữ liệu phù hợp</td></tr>';return;}

  tbody.innerHTML=list.map((i,idx)=>{
    const{remain,profit,sell}=calcItem(i);
    const pc=profit>0?'profit':profit<0?'loss':'muted';
    const id=i['_id']||'';
    return`<tr>
      <td class="c-stt">${idx+1}</td>
      <td class="c-product" title="${esc(i['Product'])}">${esc(i['Product']||'')}</td>
      <td class="r c-sm">${usd(i['Vốn USD'])}</td>
      <td class="r c-sm">${vnd(i['Vốn'])}</td>
      <td class="r c-xs">${vnd(i['Vận Chuyển'])}</td>
      <td class="r c-xs">${vnd(i['Phụ phí'])}</td>
      <td class="c-sm" title="${esc(i['Cọc qua'])}">${esc(i['Cọc qua']||'—')}</td>
      <td class="r c-xs">${vnd(i['Cọc'])}</td>
      <td class="r c-sm">${vnd(i['Giá bán'])}</td>
      <td class="r c-xs">${sell?vnd(remain):'—'}</td>
      <td class="${pc} c-xs">${sell?vnd(profit):'—'}</td>
      <td class="c-status"><span class="badge ${statusClass(i['Tình trạng'])}">${esc(i['Tình trạng']||'')}</span></td>
      <td class="c-sm" title="${esc(i['Cửa hàng'])}">${esc(i['Cửa hàng']||'—')}</td>
      <td class="c-sm" title="${esc(i['Khách'])}">${esc(i['Khách']||'—')}</td>
      <td class="c-note" title="${esc(i['Note'])}">${esc(i['Note']||'—')}</td>
      <td class="c-act"><div class="act-btns">
        <button class="icon-btn" onclick="edit('${id}')">✎</button>
        <button class="icon-btn del" onclick="del('${id}')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ---- MODAL ----
function openModal(data){
  document.getElementById('modalTitle').textContent=data?'Chỉnh sửa':'Thêm mới';
  document.getElementById('eId').value=data?data['_id']:'';
  set('fProduct',data?data['Product']:'');
  set('fShopIn',data?data['Cửa hàng']:'');
  set('fCustomer',data?data['Khách']:'');
  set('fStatusIn',data?data['Tình trạng']:'Pre-Ordered');
  set('fVonUSD',data?data['Vốn USD']:'');
  set('fVon',data?data['Vốn']:'');
  set('fShip',data?data['Vận Chuyển']:'');
  set('fExtra',data?data['Phụ phí']:'');
  set('fDepositVia',data?data['Cọc qua']:'');
  set('fDeposit',data?data['Cọc']:'');
  set('fSell',data?data['Giá bán']:'');
  set('fRemain','');
  set('fNote',data?data['Note']:'');
  document.getElementById('vonHint').textContent='';
  document.getElementById('profitPrev').textContent='Lời: —';
  document.getElementById('profitPrev').className='profit-prev z';
  document.getElementById('overlay').classList.add('open');
  if(data)syncProfit();
  setTimeout(()=>document.getElementById('fProduct').focus(),50);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function set(id,v){document.getElementById(id).value=v||'';}
function g(id){return document.getElementById(id).value;}

function syncVon(){
  const u=parseFloat(g('fVonUSD'))||0;
  const r=rate();
  const v=u*r;
  document.getElementById('fVon').value=v?Math.round(v):'';
  document.getElementById('vonHint').textContent=v?`${u} × ${r.toLocaleString('vi-VN')} = ${new Intl.NumberFormat('vi-VN').format(Math.round(v))}₫`:'';
  syncProfit();
}
function syncProfit(){
  const von=parseFloat(g('fVon'))||0;
  const ship=parseFloat(g('fShip'))||0;
  const extra=parseFloat(g('fExtra'))||0;
  const dep=parseFloat(g('fDeposit'))||0;
  const sell=parseFloat(g('fSell'))||0;
  document.getElementById('fRemain').value=sell?Math.max(0,sell-dep):'';
  const profit=sell-(von+ship+extra);
  const el=document.getElementById('profitPrev');
  if(!sell){el.textContent='Lời: —';el.className='profit-prev z';return;}
  el.textContent='Lời: '+new Intl.NumberFormat('vi-VN').format(Math.round(profit))+'₫';
  el.className='profit-prev '+(profit>0?'pos':profit<0?'neg':'z');
}

async function save(){
  const product=g('fProduct').trim();
  if(!product){alert('Vui lòng nhập tên sản phẩm!');return;}
  const id=g('eId');
  const vonUSD=parseFloat(g('fVonUSD'))||0;
  const von=Math.round(vonUSD*rate());
  const ship=parseFloat(g('fShip'))||0;
  const extra=parseFloat(g('fExtra'))||0;
  const dep=parseFloat(g('fDeposit'))||0;
  const sell=parseFloat(g('fSell'))||0;
  const row={
    'Product':product,
    'Vốn USD':vonUSD,
    'Vốn':von,
    'Vận Chuyển':ship,
    'Phụ phí':extra,
    'Cọc qua':g('fDepositVia'),
    'Cọc':dep,
    'Giá bán':sell,
    'Còn lại':sell?Math.max(0,sell-dep):0,
    'Lời':sell?sell-(von+ship+extra):0,
    'Tình trạng':g('fStatusIn'),
    'Cửa hàng':g('fShopIn'),
    'Khách':g('fCustomer'),
    'Note':g('fNote'),
  };
  const btn=document.getElementById('saveBtn');
  btn.innerHTML='<span class="spinner"></span>Đang lưu...';btn.disabled=true;
  try{
    let r;
    if(id){r=await api({action:'update',id,row});}
    else{r=await api({action:'add',row});}
    if(!r.ok)throw new Error(r.error);
    toast(id?'Đã cập nhật!':'Đã thêm mới!');
    closeModal();
    await loadData();
  }catch(e){alert('Lỗi: '+e.message);}
  finally{btn.innerHTML='Lưu';btn.disabled=false;}
}

function edit(id){const i=items.find(x=>x['_id']===id);if(i)openModal(i);}

async function del(id){
  const i=items.find(x=>x['_id']===id);
  if(!i||!confirm(`Xóa "${i['Product']}"?`))return;
  try{
    const r=await api({action:'delete',id});
    if(!r.ok)throw new Error(r.error);
    toast('Đã xóa');
    await loadData();
  }catch(e){alert('Lỗi: '+e.message);}
}

function exportCSV(){
  const headers=['Product','Vốn USD','Vốn','Vận Chuyển','Phụ phí','Cọc qua','Cọc','Giá bán','Còn lại','Lời','Tình trạng','Cửa hàng','Khách','Note'];
  const rows=items.map(i=>headers.map(h=>`"${(i[h]||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='funkopop_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
loadConfig();
</script>
</body>
</html>
